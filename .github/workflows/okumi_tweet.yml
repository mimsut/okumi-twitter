name: 오꿈이 트윗 자동 생성

on:
  schedule:
    # 매 30분마다 실행 (UTC 기준 → KST = UTC+9)
    # KST 09:00~24:00 사이에만 실행 (UTC 00:00~15:00)
    - cron: '0,30 0-14 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  generate-tweets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install anthropic requests beautifulsoup4

      - name: 오꿈이 트윗 생성 & Discord 전송
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python okumi_tweet_generator.py
