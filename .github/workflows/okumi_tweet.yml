name: 오꿈이 트윗 자동 생성

on:
  schedule:
    # KST 09:00~23:30 매 30분 (UTC 00:00~14:30)
    - cron: '0,30 0-14 * * *'
  workflow_dispatch:

jobs:
  generate-tweets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4 google-generativeai

      - name: 오꿈이 트윗 생성 & Discord 전송
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python okumi_tweet_generator.py
